<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title th:text="#{register.title}"></title>
</head>
<body>

<div layout:fragment="content" class="row justify-content-center">
    <div class="col-md-5">
        <h2 class="mb-4 text-center" th:text="#{register.header}"></h2>

        <form th:action="@{/register}" th:object="${client}" method="post" class="card p-4 shadow-sm">

            <div class="mb-3">
                <label class="form-label" th:text="#{label.name}"></label>
                <input type="text" th:field="*{name}"
                       class="form-control"
                       th:classappend="${#fields.hasErrors('name')} ? 'is-invalid' : ''"
                       th:placeholder="#{placeholder.name}" />
                <div th:if="${#fields.hasErrors('name')}" th:errors="*{name}" class="invalid-feedback"></div>
            </div>

            <div class="mb-3">
                <label class="form-label" th:text="#{label.email}"></label>
                <input type="email" th:field="*{email}"
                       class="form-control"
                       th:classappend="${#fields.hasErrors('email')} ? 'is-invalid' : ''"
                       th:placeholder="#{placeholder.email}" />
                <div th:if="${#fields.hasErrors('email')}" th:errors="*{email}" class="invalid-feedback"></div>
            </div>

            <div class="mb-3">
                <label class="form-label" th:text="#{label.password}"></label>
                <input type="password" th:field="*{password}"
                       class="form-control"
                       th:classappend="${#fields.hasErrors('password')} ? 'is-invalid' : ''"
                       th:placeholder="#{placeholder.password}" />
                <div th:if="${#fields.hasErrors('password')}" th:errors="*{password}" class="invalid-feedback"></div>
            </div>

            <button type="submit" class="btn btn-primary w-100 mt-3" th:text="#{btn.register}"></button>
        </form>

        <div class="text-center mt-3">
            <a th:href="@{/login}" th:text="#{register.has_account}"></a>
        </div>
    </div>
</div>

</body>
</html>
