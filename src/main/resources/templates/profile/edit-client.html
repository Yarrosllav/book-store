<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>Редагування профілю</title>
</head>
<body>

<div layout:fragment="content" class="row justify-content-center">
    <div class="col-md-5">
        <h2 class="mb-4">Редагування профілю</h2>

        <form th:action="@{/profile/edit/client}" th:object="${clientDto}" method="post" class="card p-4 shadow-sm">

            <div class="mb-3">
                <label class="form-label">Ім'я</label>
                <input type="text" th:field="*{name}" class="form-control" />
            </div>

            <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="email" th:value="${clientDto.email}" class="form-control" disabled/>
            </div>

            <div class="mb-3">
                <label class="form-label">Новий пароль (залиште пустим, якщо не міняєте)</label>
                <input type="password" th:field="*{password}" class="form-control" />
            </div>

            <div class="mb-3">
                <label class="form-label">Поповнити баланс (грн)</label>
                <input type="number" step="0.01" th:field="*{balance}" class="form-control" placeholder="0.00"/>
            </div>

            <div class="d-flex justify-content-end mt-3">
                <a th:href="@{/profile}" class="btn btn-secondary me-2">Скасувати</a>
                <button type="submit" class="btn btn-success">Зберегти</button>
            </div>
        </form>
    </div>
</div>

</body>
</html>
