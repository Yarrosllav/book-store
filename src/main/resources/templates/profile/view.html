<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title th:text="#{profile.view.title}"></title>
</head>
<body>

<div layout:fragment="content" class="row justify-content-center">
    <div class="col-md-6">
        <h2 class="mb-4" th:text="#{profile.view.header}"></h2>

        <div th:if="${param.success == 'updated'}" class="alert alert-success" th:text="#{msg.profile_updated}"></div>

        <div class="card shadow-sm">
            <div class="card-body">
                <h4 class="card-title" th:text="${user.name}"></h4>
                <p class="text-muted" th:text="${user.email}"></p>
                <hr>

                <div th:if="${role == 'CLIENT'}">
                    <p><strong th:text="#{profile.my_balance}"></strong> <span class="text-success fw-bold" th:text="${user.balance} + ' ' + #{currency.uah}"></span></p>
                </div>

                <div th:if="${role == 'EMPLOYEE'}">
                    <p><strong th:text="#{label.phone} + ':'"></strong> <span th:text="${user.phone}"></span></p>
                    <p><strong th:text="#{label.birth_date} + ':'"></strong> <span th:text="${user.birthDate}"></span></p>
                </div>

                <div class="mt-4 d-flex justify-content-between">
                    <a th:href="@{/profile/edit}" class="btn btn-primary" th:text="#{btn.edit_profile}"></a>

                    <form sec:authorize="hasRole('CLIENT')" th:action="@{/profile/delete}" method="post" onsubmit="return confirm(this.getAttribute('data-confirm-msg'));" th:data-confirm-msg="#{confirm.delete_account}">
                        <button type="submit" class="btn btn-danger" th:text="#{btn.delete_account}"></button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
