<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title th:text="${book.name}">Деталі книги</title>
</head>
<body>

<div layout:fragment="content">
    <div class="mb-3">
        <a th:href="@{/books}" class="btn btn-outline-secondary btn-sm">&larr; Назад до каталогу</a>
    </div>

    <div th:if="${param.success == 'updated'}" class="alert alert-success">Книгу успішно оновлено!</div>

    <div class="card shadow-sm">
        <div class="card-body">
            <h2 class="card-title" th:text="${book.name}">Назва</h2>
            <h4 class="text-muted mb-4" th:text="${book.author}">Автор</h4>

            <div class="row mb-4">
                <div class="col-md-6">
                    <ul class="list-group list-group-flush">
                        <li class="list-group-item"><strong>Жанр:</strong> <span th:text="${book.genre}"></span></li>
                        <li class="list-group-item"><strong>Вікова група:</strong> <span th:text="${book.ageGroup}"></span></li>
                        <li class="list-group-item"><strong>Мова:</strong> <span th:text="${book.language}"></span></li>
                        <li class="list-group-item"><strong>К-сть сторінок:</strong> <span th:text="${book.pages}"></span></li>
                        <li class="list-group-item"><strong>Дата публікації:</strong> <span th:text="${book.publicationDate}"></span></li>
                    </ul>
                </div>
                <div class="col-md-6 text-center d-flex flex-column justify-content-center align-items-center">
                    <h3 class="text-success fw-bold display-6 mb-3" th:text="${book.price} + ' грн'">Ціна</h3>

                    <form sec:authorize="hasRole('CLIENT')" th:action="@{/basket/add/{id}(id=${book.id})}" method="post" class="d-flex">
                        <input type="number" name="quantity" value="1" min="1" class="form-control me-2" style="width: 80px;">
                        <button type="submit" class="btn btn-primary btn-lg">Додати в кошик</button>
                    </form>

                    <div sec:authorize="hasRole('EMPLOYEE')">
                        <a th:href="@{/books/{id}/edit(id=${book.id})}" class="btn btn-warning">Редагувати</a>
                        <form th:action="@{/books/{id}/delete(id=${book.id})}" method="post" class="d-inline">
                            <button type="submit" class="btn btn-danger" onclick="return confirm('Видалити книгу?');">Видалити</button>
                        </form>
                    </div>
                </div>
            </div>

            <h5>Опис:</h5>
            <p th:text="${book.description}">Немає опису</p>

            <h5 class="mt-4">Характеристики:</h5>
            <p th:text="${book.characteristics}">Не вказано</p>
        </div>
    </div>
</div>

</body>
</html>
