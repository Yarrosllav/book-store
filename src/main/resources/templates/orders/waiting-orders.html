<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title th:text="#{orders.pending.title}"></title>
</head>
<body>

<div layout:fragment="content">
    <h2 class="mb-4" th:text="#{orders.pending.header}"></h2>

    <div th:if="${param.success == 'confirmed'}" class="alert alert-success" th:text="#{msg.order_confirmed}"></div>

    <form th:action="@{/orders/waiting}" method="get" class="mb-4 row g-2 align-items-center">
        <div class="col-auto">
            <input type="text" name="search" th:value="${search}"
                   class="form-control"
                   th:placeholder="#{orders.search_bu_email}">
        </div>
        <div class="col-auto">
            <select name="sortDir" class="form-select">
                <option value="desc" th:selected="${sortDir == 'desc'}" th:text="#{orders.new_first}"></option>
                <option value="asc"  th:selected="${sortDir == 'asc'}"  th:text="#{orders.old_first}"></option>
            </select>
        </div>
        <div class="col-auto">
            <button type="submit" class="btn btn-primary" th:text="#{btn.search}"></button>
            <a th:href="@{/orders/waiting}" class="btn btn-outline-secondary" th:text="#{btn.reset}"></a>
        </div>
    </form>

    <div th:if="${orders.isEmpty()}" class="alert alert-info" th:text="#{orders.pending.empty}"></div>

    <div th:if="${!orders.isEmpty()}">
        <table class="table table-striped table-hover align-middle shadow-sm">
            <thead class="table-dark">
            <tr>
                <th th:text="#{table.id}"></th>
                <th th:text="#{table.date_time}"></th>
                <th th:text="#{table.client_email}"></th>
                <th th:text="#{table.sum}"></th>
                <th th:text="#{table.actions}"></th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="order : ${orders}">
                <td class="fw-bold" th:text="${order.id}"></td>
                <td th:text="${#temporals.format(order.orderDate, 'dd.MM.yyyy HH:mm')}"></td>
                <td th:text="${order.clientEmail}"></td>
                <td class="text-success fw-bold" th:text="${order.price} + ' ' + #{currency.uah}"></td>
                <td class="d-flex gap-2">
                    <a th:href="@{/orders/{id}(id=${order.id})}"
                       class="btn btn-sm btn-outline-primary"
                       th:text="#{order.contains}"></a>
                    <form th:action="@{/orders/{id}/confirm(id=${order.id})}" method="post">
                        <button type="submit" class="btn btn-sm btn-success" th:text="#{btn.confirm}"></button>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>

        <nav th:if="${totalPages > 1}" class="mt-4">
            <ul class="pagination justify-content-center">
                <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                    <a class="page-link"
                       th:href="@{/orders/waiting(page=${currentPage > 0 ? currentPage - 1 : 0}, size=20, search=${search}, sortDir=${sortDir})}">
                        &laquo;
                    </a>
                </li>
                <li class="page-item"
                    th:each="i : ${#numbers.sequence(0, totalPages - 1)}"
                    th:classappend="${i == currentPage} ? 'active'">
                    <a class="page-link"
                       th:href="@{/orders/waiting(page=${i}, size=20, search=${search}, sortDir=${sortDir})}"
                       th:text="${i + 1}"></a>
                </li>
                <li class="page-item" th:classappend="${currentPage == totalPages - 1} ? 'disabled'">
                    <a class="page-link"
                       th:href="@{/orders/waiting(page=${currentPage + 1}, size=20, search=${search}, sortDir=${sortDir})}">
                        &raquo;
                    </a>
                </li>
            </ul>
        </nav>
    </div>
</div>

</body>
</html>
