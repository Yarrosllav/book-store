<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title th:text="#{orders.my.title}"></title>
</head>
<body>

<div layout:fragment="content">
    <h2 class="mb-4" th:text="#{orders.my.header}"></h2>

    <div th:if="${param.success == 'orderPlaced'}" class="alert alert-success" th:text="#{msg.order_placed}"></div>

    <div th:if="${orders.isEmpty()}" class="alert alert-info">
        <span th:text="#{orders.my.empty}"></span>
        <a th:href="@{/books}" th:text="#{basket.go_to_catalog}"></a>.
    </div>

    <div th:if="${!orders.isEmpty()}">
        <div class="card mb-3 shadow-sm" th:each="order : ${orders}">
            <div class="card-header bg-light d-flex justify-content-between align-items-center">
                <strong th:text="#{order.number} + ' #' + ${order.id}"></strong>
                <span class="text-muted small"
                      th:text="${#temporals.format(order.orderDate, 'dd.MM.yyyy HH:mm')}"></span>
            </div>
            <div class="card-body">
                <p class="mb-1">
                    <strong th:text="#{order.sum}"></strong>
                    <span class="text-success fw-bold"
                          th:text="${order.price} + ' ' + #{currency.uah}"></span>
                </p>
                <p class="mb-2">
                    <strong th:text="#{order.status}"></strong>
                    <span th:if="${order.status.name() == 'PENDING'}"
                          class="badge bg-warning text-dark"
                          th:text="#{${order.status.messageKey}}"></span>
                    <span th:if="${order.status.name() == 'CONFIRMED'}"
                          class="badge bg-success"
                          th:text="#{${order.status.messageKey}}"></span>
                    <span th:if="${order.status.name() == 'REFUNDED'}"
                          class="badge bg-danger"
                          th:text="#{${order.status.messageKey}}"></span>
                </p>

                <div class="d-flex gap-2 flex-wrap">
                    <a th:href="@{/orders/{id}(id=${order.id})}"
                       class="btn btn-sm btn-outline-primary"
                       th:text="#{order.contains}"></a>

                    <form th:if="${order.status.name() == 'PENDING'}"
                          th:action="@{/orders/{id}/cancel(id=${order.id})}" method="post">
                        <button type="submit" class="btn btn-sm btn-outline-danger"
                                th:data-confirm-msg="#{order.cancellation.question}"
                                onclick="return confirm(this.getAttribute('data-confirm-msg'));"
                                th:text="#{order.cancel}"></button>
                    </form>
                </div>
            </div>
        </div>

        <nav th:if="${totalPages > 1}" class="mt-4">
            <ul class="pagination justify-content-center">
                <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                    <a class="page-link"
                       th:href="@{/orders/my(page=${currentPage - 1}, sortBy=${sortBy}, sortDir=${sortDir})}">&laquo;</a>
                </li>
                <li class="page-item"
                    th:each="i : ${#numbers.sequence(0, totalPages - 1)}"
                    th:classappend="${i == currentPage} ? 'active'">
                    <a class="page-link"
                       th:href="@{/orders/my(page=${i}, sortBy=${sortBy}, sortDir=${sortDir})}"
                       th:text="${i + 1}"></a>
                </li>
                <li class="page-item" th:classappend="${currentPage == totalPages - 1} ? 'disabled'">
                    <a class="page-link"
                       th:href="@{/orders/my(page=${currentPage + 1}, sortBy=${sortBy}, sortDir=${sortDir})}">&raquo;</a>
                </li>
            </ul>
        </nav>
    </div>
</div>


</body>
</html>
