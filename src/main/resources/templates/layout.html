<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title layout:title-pattern="$CONTENT_TITLE - BookStore">Bukva</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --brand: #7F77DD;
            --brand-light: #AFA9EC;
        }
        body { background: #f8f9fa; }
        .navbar { box-shadow: 0 2px 8px rgba(0,0,0,.25); }
        .nav-link { border-radius: 6px; padding: .4rem .75rem !important; transition: background .15s; }
        .nav-link:hover { background: rgba(255,255,255,.1); }
        .navbar-brand:hover { opacity: .85; }
        .lang-switch a { font-size: .8rem; opacity: .75; transition: opacity .15s; }
        .lang-switch a:hover { opacity: 1; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container">
        <a class="navbar-brand d-flex align-items-center gap-2" th:href="@{/books}">
            <svg width="22" height="22" viewBox="0 0 20 20" fill="none">
                <rect x="2" y="3" width="11" height="14" rx="1.5" fill="#7F77DD"/>
                <rect x="7" y="3" width="11" height="14" rx="1.5" fill="#AFA9EC" opacity=".7"/>
            </svg>
            <span class="fw-semibold">Bukva</span>
        </a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navMenu">
            <ul class="navbar-nav me-auto gap-1">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/books}" th:text="#{nav.catalog}"></a>
                </li>
                <li class="nav-item" sec:authorize="hasRole('CLIENT')">
                    <a class="nav-link" th:href="@{/basket}" th:text="#{nav.basket}"></a>
                </li>
                <li class="nav-item" sec:authorize="hasRole('CLIENT')">
                    <a class="nav-link" th:href="@{/orders/my}" th:text="#{nav.orders}"></a>
                </li>

                <li class="nav-item" sec:authorize="hasRole('EMPLOYEE')">
                    <a class="nav-link" th:href="@{/books/add}"
                       style="border: 0.5px solid rgba(255,255,255,.2); border-radius: 6px; padding: 5px 11px;"
                       th:text="#{nav.add_book}"></a>
                </li>
                <li class="nav-item" sec:authorize="hasRole('EMPLOYEE')">
                    <a class="nav-link" th:href="@{/orders/waiting}"
                       style="border: 0.5px solid rgba(255,255,255,.2); border-radius: 6px; padding: 5px 11px;"
                       th:text="#{nav.new_orders}"></a>
                </li>
                <li class="nav-item" sec:authorize="hasRole('EMPLOYEE')">
                    <a class="nav-link" th:href="@{/orders/processed}"
                       style="border: 0.5px solid rgba(255,255,255,.2); border-radius: 6px; padding: 5px 11px;"
                       th:text="#{nav.my_history}"></a>
                </li>
                <li class="nav-item" sec:authorize="hasRole('EMPLOYEE')">
                    <a class="nav-link" th:href="@{/admin/clients}"
                       style="border: 0.5px solid rgba(255,255,255,.2); border-radius: 6px; padding: 5px 11px;"
                       th:text="#{nav.clients}"></a>
                </li>
            </ul>

            <ul class="navbar-nav align-items-center gap-2 me-3">
                <li class="nav-item dropdown" sec:authorize="hasRole('CLIENT')">
                    <a class="nav-link dropdown-toggle d-flex align-items-center gap-2" href="#" data-bs-toggle="dropdown">
                        <span style="width:7px;height:7px;border-radius:50%;background:#1D9E75;display:inline-block;"></span>
                        <span style="background:rgba(29,158,117,.12);border:0.5px solid rgba(29,158,117,.35);border-radius:20px;padding:3px 10px;font-size:14px;color:#1D9E75;"
                              th:text="${currentBalance} + ' ' + #{currency.uah}"></span>
                    </a>
                    <div class="dropdown-menu p-3" style="width:240px; min-width:240px;">
                        <p class="small text-muted mb-2" th:text="#{nav.topup_balance}"></p>
                        <form th:action="@{/profile/balance/topup}" method="post" class="d-flex gap-2">
                            <input type="number" name="amount" step="0.01" min="1"
                                   class="form-control form-control-sm" required>
                            <button type="submit" class="btn btn-success btn-sm text-nowrap" th:text="#{nav.topup}"></button>
                        </form>
                    </div>
                </li>

                <li class="nav-item" sec:authorize="isAnonymous()">
                    <a class="nav-link" th:href="@{/login}" th:text="#{nav.login}"></a>
                </li>
                <li class="nav-item" sec:authorize="isAnonymous()">
                    <a class="btn btn-outline-light btn-sm" th:href="@{/register}" th:text="#{nav.register}"></a>
                </li>

                <li class="nav-item" sec:authorize="isAuthenticated()">
                    <a class="nav-link d-flex align-items-center gap-2" th:href="@{/profile}">
                        <div style="width:28px;height:28px;border-radius:50%;background:#534AB7;
                                    display:flex;align-items:center;justify-content:center;
                                    font-size:11px;color:#CECBF6;font-weight:600;flex-shrink:0;">
                            <span th:text="${#strings.substring(#authentication.name, 0, 2).toUpperCase()}"></span>
                        </div>
                        <span class="d-none d-xl-inline" sec:authentication="name"></span>
                    </a>
                </li>

                <li class="nav-item" sec:authorize="isAuthenticated()">
                    <form th:action="@{/logout}" method="post" class="m-0">
                        <button type="submit" class="btn btn-outline-danger btn-sm" th:text="#{nav.logout}"></button>
                    </form>
                </li>
            </ul>

            <div class="lang-switch d-flex gap-2 align-items-center border-start border-secondary ps-3">
                <a class="text-white text-decoration-none" href="?lang=uk">УКР</a>
                <span class="text-secondary">|</span>
                <a class="text-white text-decoration-none" href="?lang=en">ENG</a>
            </div>
        </div>
    </div>
</nav>

<div class="container" layout:fragment="content"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
