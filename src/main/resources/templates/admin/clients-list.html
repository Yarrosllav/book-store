<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title th:text="#{admin.clients.title}"></title>
</head>
<body>
<div layout:fragment="content">
    <h2 class="mb-4" th:text="#{admin.clients.title}"></h2>

    <form th:action="@{/admin/clients}" method="get" class="mb-4 row g-2 align-items-center">
        <div class="col-auto">
            <div class="input-group">
                <span class="input-group-text bg-white border-end-0">
                    <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 16 16">
                        <circle cx="6.5" cy="6.5" r="4"/><path d="M11 11l3 3"/>
                    </svg>
                </span>
                <input type="text" name="search" th:value="${search}"
                       class="form-control border-start-0"
                       th:placeholder="#{placeholder.search}">
            </div>
        </div>
        <div class="col-auto">
            <button type="submit" class="btn btn-primary" th:text="#{btn.search}"></button>
            <a th:href="@{/admin/clients}" class="btn btn-outline-secondary" th:text="#{btn.reset}"></a>
        </div>
    </form>

    <table class="table table-striped table-hover align-middle shadow-sm">
        <thead class="table-dark">
        <tr>
            <th th:text="#{table.id}"></th>
            <th th:text="#{table.name}"></th>
            <th th:text="#{table.email}"></th>
            <th th:text="#{table.balance}"></th>
            <th th:text="#{table.status}"></th>
            <th th:text="#{table.actions}"></th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="client : ${clients}">
            <td class="fw-bold text-muted" th:text="${client.id}"></td>
            <td th:text="${client.name}"></td>
            <td th:text="${client.email}"></td>
            <td class="fw-semibold" th:text="${client.balance} + ' ' + #{currency.uah}"></td>
            <td>
                <span th:if="${client.isBlocked}"
                      class="badge bg-danger"
                      th:text="#{status.blocked}"></span>
                <span th:unless="${client.isBlocked}"
                      class="badge bg-success"
                      th:text="#{status.active}"></span>
            </td>
            <td>
                <form th:if="${!client.isBlocked}"
                      th:action="@{/admin/clients/{id}/block(id=${client.id})}"
                      method="post" class="d-inline">
                    <button type="submit" class="btn btn-warning btn-sm"
                            th:text="#{btn.block}"></button>
                </form>
                <form th:if="${client.isBlocked}"
                      th:action="@{/admin/clients/{id}/unblock(id=${client.id})}"
                      method="post" class="d-inline">
                    <button type="submit" class="btn btn-outline-success btn-sm"
                            th:text="#{btn.unblock}"></button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>

    <nav th:if="${totalPages > 1}" class="mt-4">
        <ul class="pagination justify-content-center">
            <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                <a class="page-link"
                   th:href="@{/admin/clients(page=${currentPage - 1}, search=${search})}">&laquo;</a>
            </li>
            <li class="page-item"
                th:each="i : ${#numbers.sequence(0, totalPages - 1)}"
                th:classappend="${i == currentPage} ? 'active'">
                <a class="page-link"
                   th:href="@{/admin/clients(page=${i}, search=${search})}"
                   th:text="${i + 1}"></a>
            </li>
            <li class="page-item" th:classappend="${currentPage == totalPages - 1} ? 'disabled'">
                <a class="page-link"
                   th:href="@{/admin/clients(page=${currentPage + 1}, search=${search})}">&raquo;</a>
            </li>
        </ul>
    </nav>
</div>

<script>
    window.addEventListener('pageshow', function(event) {
        if (event.persisted) {
            window.location.reload();
        }
    });
</script>
</body>
</html>
