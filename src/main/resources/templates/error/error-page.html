<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title th:text="#{error.page.error}"></title>
</head>
<body>

<div layout:fragment="content" class="row justify-content-center text-center mt-5">
    <div class="col-md-6">
        <div class="card shadow-sm border-danger">
            <div class="card-body py-5">
                <h1 class="display-1 text-danger fw-bold" th:text="${errorCode}"></h1>
                <h3 class="mb-4 text-muted" th:text="#{error.page.information}"></h3>
                <p class="lead" th:text="${errorMessage}"></p>
                <div class="mt-4">
                    <a th:href="@{/books}" class="btn btn-primary" th:text="#{error.page.backtomain}"></a>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
